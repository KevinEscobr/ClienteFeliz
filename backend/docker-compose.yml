services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        container_name: ClienteFeliz_app
        working_dir: /var/www
        volumes:
            - ./:/var/www
        depends_on:
            - db
    web:
        image: nginx:1.27-alpine
        container_name: ClienteFeliz_web
        ports:
            - "8080:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
    db:
        image: mysql:8.0
        container_name: ClienteFeliz_db
        command: --default-authentication-plugin=mysql_native_password
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: ClienteFeliz #nombre de la base de datos
            MYSQL_USER: feliz_user
            MYSQL_PASSWORD: feliz_pass
        ports:
            - "3307:3306"
        volumes:
            - dbdata:/var/lib/mysql
volumes:
        dbdata:
